- text: He who desires but acts not, breeds pestilence.
  source: Proverbs of Hell, William Blake
- text: A revolutionary age is an age of action; ours is the age of advertisement and publicity. Nothing ever happens but there is immediate publicity everywhere.
  source: Kierkegaard
